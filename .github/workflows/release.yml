name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-to-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cutebacktests/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          version = str(project["version"])
          tag = str(os.environ["GIT_TAG"])
          normalized_tag = tag[1:] if tag.startswith("v") else tag
          if normalized_tag != version:
              raise SystemExit(f"Tag {tag!r} does not match project version {version!r}")
          print(f"Validated tag {tag} against project version {version}")
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check built distributions
        run: python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
